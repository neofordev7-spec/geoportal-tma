<!DOCTYPE html>
{% load static %}
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <title>{% block title %}GEOPORTAL{% endblock %}</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#47f425",
                        "background-light": "#f6f8f5",
                        "background-dark": "#084c53",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary">

    <div class="fixed top-4 left-0 right-0 z-50 px-4">
        <header
            class="max-w-7xl mx-auto flex items-center justify-between whitespace-nowrap border border-white/10 bg-white/5 backdrop-blur-xl rounded-full px-6 py-3 shadow-lg">
            <div class="flex items-center gap-8">
                <a href="{% url 'dashboard' %}" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary/20 text-primary">
                        <span class="material-symbols-outlined" style="font-size: 20px;">public</span>
                    </div>
                    <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight">GEOPORTAL</h2>
                </a>
                <nav class="hidden md:flex items-center gap-8">
                    <a class="text-white/70 hover:text-white transition-colors text-sm font-medium"
                        href="{% url 'dashboard' %}">Asosiy</a>
                    <a class="text-white/70 hover:text-white transition-colors text-sm font-medium"
                        href="#">Haqimizda</a>
                    <a class="text-white/70 hover:text-white transition-colors text-sm font-medium"
                        href="#">Savol-Javob</a>
                    <a class="text-white/70 hover:text-white transition-colors text-sm font-medium"
                        href="#">Bog'lanish</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <label class="hidden lg:flex flex-col min-w-40 h-10 w-64">
                    <div
                        class="flex w-full flex-1 items-stretch rounded-full h-full border border-white/10 bg-white/5 backdrop-blur-md overflow-hidden transition-all focus-within:border-primary/50 focus-within:bg-white/10">
                        <div class="text-white/50 flex items-center justify-center pl-4 pr-2">
                            <span class="material-symbols-outlined" style="font-size: 20px;">search</span>
                        </div>
                        <input
                            class="w-full min-w-0 flex-1 bg-transparent border-none text-sm text-slate-100 placeholder:text-white/50 focus:ring-0 px-2 h-full"
                            placeholder="Qidiruv..." type="text" />
                    </div>
                </label>
                <div class="flex items-center gap-3">
                    <button
                        class="flex items-center justify-center h-10 px-5 rounded-full bg-primary text-background-dark text-sm font-bold tracking-wide hover:bg-primary/90 transition-colors shadow-[0_0_15px_rgba(71,244,37,0.3)]">
                        Fuqaro
                    </button>
                    <button
                        class="flex items-center justify-center w-10 h-10 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-colors text-white/70 hover:text-white">
                        <span class="material-symbols-outlined" style="font-size: 20px;">settings</span>
                    </button>
                </div>
            </div>
        </header>
    </div>

    <main class="flex-grow flex flex-col max-w-7xl mx-auto w-full px-4 pt-32 pb-12">

        {% block content %}

        {% endblock content %}
    </main>

    <footer class="mt-auto border-t border-white/10 bg-black/20 backdrop-blur-md relative z-10">
        <div class="max-w-7xl mx-auto w-full px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-primary">
                    <span class="material-symbols-outlined" style="font-size: 14px;">public</span>
                </div>
                <p class="text-sm font-medium text-white/50">© 2024 GEOPORTAL. Barcha huquqlar himoyalangan.</p>
            </div>
            <nav class="flex flex-wrap items-center justify-center gap-6 md:gap-8">
                <a class="text-sm font-medium text-white/50 hover:text-primary transition-colors" href="#">Maxfiylik
                    siyosati</a>
                <a class="text-sm font-medium text-white/50 hover:text-primary transition-colors" href="#">Foydalanish
                    shartlari</a>
                <a class="text-sm font-medium text-white/50 hover:text-primary transition-colors"
                    href="#">Bog'lanish</a>
            </nav>
            <div class="flex items-center gap-3">
                <a aria-label="Language"
                    class="flex items-center justify-center w-10 h-10 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 hover:text-primary transition-colors text-white/50"
                    href="#">
                    <span class="material-symbols-outlined" style="font-size: 20px;">language</span>
                </a>
                <a aria-label="Help"
                    class="flex items-center justify-center w-10 h-10 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 hover:text-primary transition-colors text-white/50"
                    href="#">
                    <span class="material-symbols-outlined" style="font-size: 20px;">help_outline</span>
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
